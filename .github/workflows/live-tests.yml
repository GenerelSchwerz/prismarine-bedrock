name: Live Tests

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to test. Defaults to the workflow branch.
        required: false
        type: string
      host:
        description: Bedrock server host.
        required: false
        default: localhost
        type: string
      port:
        description: Bedrock server UDP port.
        required: false
        default: "19132"
        type: string
      target:
        description: E2E target label, for tests that gate by target family.
        required: false
        default: manual-live
        type: string
      mc-version:
        description: Bedrock protocol/data version.
        required: false
        default: "1.26.10"
        type: string
  issue_comment:
    types:
      - created

permissions:
  contents: read
  pull-requests: read
  issues: read

concurrency:
  group: live-tests-${{ github.event_name == 'issue_comment' && github.event.issue.number || github.ref }}
  cancel-in-progress: false

jobs:
  resolve-comment-ref:
    name: Resolve PR comment ref
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '/test-live')
    runs-on: ubuntu-latest
    outputs:
      head-sha: ${{ steps.pr.outputs.head-sha }}
    steps:
      - name: Resolve pull request head
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo
            const pull_number = context.payload.issue.number
            const { data: pull } = await github.rest.pulls.get({ owner, repo, pull_number })
            core.setOutput('head-sha', pull.head.sha)

  live:
    name: Live tests
    if: always() && (github.event_name == 'workflow_dispatch' || needs.resolve-comment-ref.result == 'success')
    needs:
      - resolve-comment-ref
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || needs.resolve-comment-ref.outputs.head-sha || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run live tests
        env:
          HOST: ${{ github.event_name == 'workflow_dispatch' && inputs.host || vars['LIVE_TEST_HOST'] || 'localhost' }}
          PORT: ${{ github.event_name == 'workflow_dispatch' && inputs.port || vars['LIVE_TEST_PORT'] || '19132' }}
          E2E_SERVER_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || vars['LIVE_TEST_TARGET'] || 'comment-live' }}
          MC_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs['mc-version'] || vars['LIVE_TEST_MC_VERSION'] || '1.26.10' }}
        run: pnpm run test:live
